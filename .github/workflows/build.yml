name: Build SemeloOS ISO

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-iso:
    name: Build SemeloOS
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      - name: Update system and install archiso
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso grub syslinux git

      - name: Build SemeloOS profile from releng base
        run: |
          # ── Step 1: Copy COMPLETE releng profile (proven bootable base)
          cp -r /usr/share/archiso/configs/releng/ /tmp/semelo-profile

          # ── Step 2: Replace packages with SemeloOS list
          cp semelo-profile/packages.x86_64 /tmp/semelo-profile/packages.x86_64

          # ── Step 3: Replace profiledef (custom name, label, version)
          cp semelo-profile/profiledef.sh /tmp/semelo-profile/profiledef.sh

          # ── Step 4: Overlay our airootfs customizations on top of releng
          cp -r semelo-profile/airootfs/. /tmp/semelo-profile/airootfs/

          # ── Step 5: Setup systemd service symlinks
          mkdir -p /tmp/semelo-profile/airootfs/etc/systemd/system/multi-user.target.wants
          ln -sf /usr/lib/systemd/system/NetworkManager.service \
            /tmp/semelo-profile/airootfs/etc/systemd/system/multi-user.target.wants/NetworkManager.service
          ln -sf /etc/systemd/system/semelo-spoof.service \
            /tmp/semelo-profile/airootfs/etc/systemd/system/multi-user.target.wants/semelo-spoof.service

          mkdir -p /tmp/semelo-profile/airootfs/etc/systemd/system/sysinit.target.wants
          ln -sf /etc/systemd/system/semelo-root-unlock.service \
            /tmp/semelo-profile/airootfs/etc/systemd/system/sysinit.target.wants/semelo-root-unlock.service

          # ── Step 6: Verify mkinitcpio.conf has archiso hook (CRITICAL for live boot!)
          echo "=== mkinitcpio.conf ===" && cat /tmp/semelo-profile/airootfs/etc/mkinitcpio.conf || true
          # If missing, write it explicitly
          echo 'MODULES=()' > /tmp/semelo-profile/airootfs/etc/mkinitcpio.conf
          echo 'BINARIES=()' >> /tmp/semelo-profile/airootfs/etc/mkinitcpio.conf
          echo 'FILES=()' >> /tmp/semelo-profile/airootfs/etc/mkinitcpio.conf
          echo 'HOOKS=(base systemd archiso sd-vconsole modconf kms block filesystems)' >> /tmp/semelo-profile/airootfs/etc/mkinitcpio.conf
          echo "=== Final mkinitcpio.conf ===" && cat /tmp/semelo-profile/airootfs/etc/mkinitcpio.conf

          # ── Step 7: Show final profile structure
          echo "=== Final profile ==="
          ls /tmp/semelo-profile/
          echo "=== airootfs/etc/systemd/system/multi-user.target.wants ==="
          ls /tmp/semelo-profile/airootfs/etc/systemd/system/multi-user.target.wants/ 2>/dev/null || echo "(empty)"

      - name: Build ISO
        run: |
          mkdir -p /tmp/work /tmp/out
          mkarchiso -v -w /tmp/work -o /tmp/out /tmp/semelo-profile
          echo "Build complete!"
          ls -lh /tmp/out/

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: semelo-os-build-${{ github.run_number }}
          path: /tmp/out/*.iso
          retention-days: 7
          compression-level: 0
